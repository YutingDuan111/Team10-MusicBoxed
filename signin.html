<!DOCTYPE html>

<html>
    <head>
        <title>MusicBoxed - Sign In</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="CSS/style.css">
        <link rel="stylesheet" href="CSS/signin.css">
    </head>

    <body>

        <nav>    
            <h1 id="Logo">M u s i c B o x d</h1>

            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Artists</a></li>
                <li><a href="playlists.html">Playlists</a></li>
                <li><a href="signin.html">Sign In!</a></li>
                <li><a href="artists.html">Artists</a></li>
                <li><a href="playlists.html">Playlists</a></li>
                <li><a href="signin.html">Sign In</a></li>
            </ul>
        </nav>

        <div class="sign-in-box">
            <div>
                <form>
                    <input>
                    <button>Sign In</button>
            <div class="form-container">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-button active" onclick="switchTab('login')">Login</button>
                    <button class="tab-button" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="form-content active">
                    <h2>Login</h2>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="Email" 
                        required
                    >
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Password" 
                        required
                    >
                    <button type="button" onclick="handleLogin()">Login</button>
                    <p id="loginMessage" class="message"></p>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="form-content">
                    <h2>Sign Up</h2>
                    <input 
                        type="text" 
                        id="signupUsername" 
                        placeholder="Username" 
                        required
                    >
                    <input 
                        type="email" 
                        id="signupEmail" 
                        placeholder="Email" 
                        required
                    >
                    <input 
                        type="password" 
                        id="signupPassword" 
                        placeholder="Password" 
                        required
                    >
                    <button type="button" onclick="handleSignup()">Sign Up</button>
                    <p id="signupMessage" class="message"></p>
                </form>
            </div>
        </div>

        <script src="JS/script.js"></script>
    </body>

</html>
