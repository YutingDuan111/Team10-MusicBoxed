<!DOCTYPE html>
<html lang="en">
<head>

 <body>
   <nav>
      <h1 id="Logo"><a href="index.html">M u s i c B o x d</a></h1>

      <ul class="menu">
        <li><a href="index.html">Home</a></li>

        <li><a class="active" href="signin.html">Sign In!</a></li>
      </ul>

    <main class="auth-page">
      <div class="sign-in-box">
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back — log your next album.</p>

        <form>
          <label for="email">Email or Username</label>
          <input id="email" type="text" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" required />

          <button type="submit">Sign In</button>

          <p class="small-text">
            New here? <a href="#">Create an account</a>
          </p>
        </form>
      </div>
    </main>
  </body>
